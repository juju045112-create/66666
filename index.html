<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>11國世界互動故事牆</title>
    
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        canvas.a-canvas { touch-action: none; }
        body { margin: 0; overflow: hidden; }

        /* 💡 彈窗樣式：保持高質感設計 */
        .modal-overlay {
            display: none; /* 預設隱藏 */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(177, 177, 170, 0.7);
            z-index: 999;
            justify-content: center; 
            align-items: center;
        }

        .modal-content {
            background: #f6f5e5;
            padding: 25px;
            border-radius: 15px;
            max-width: 90%;
            width: 500px; /* 稍微加寬，讓照片展示更好看 */
            text-align: center;
            font-family: "Microsoft JhengHei", sans-serif;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        /* 2. 新增：Swiper 輪播圖專屬樣式 */
        .swiper {
            width: 100%;
            height: 260px;
            margin: 15px 0;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保照片填滿不變形 */
            border-radius: 8px;
        }
        /* 調整 Swiper 左右箭頭顏色 */
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff;
        }
        /* 調整 Swiper 分頁圓點顏色 */
        .swiper-pagination-bullet-active {
            background: #ffffff;
        }

        /* 關閉按鈕樣式 */
        .close-btn {
            background: #ffffffd6;
            color: #100e0e;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .close-btn:hover {
            background: #cdb5b5;
        }
    </style>
</head>

<body>

    <div class="modal-overlay" id="infoModal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin: 0 0 10px 0;">國家名稱</h2>
            
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="modal-images-wrapper">
                    </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>

            <p id="modal-desc" style="line-height: 1.6; text-align: left; max-height: 120px; overflow-y: auto;">介紹文字...</p>
            <button class="close-btn" onclick="closeModal()">關閉</button>
        </div>
    </div>

    <a-scene>
        <a-assets>
            <img id="flag-taiwan" src="taiwan.jpg" />
            <img id="flag-japan" src="japan.jpg" />
            <img id="flag-usa" src="usa.jpg" />
            <img id="flag-france" src="france.jpg" />
            <img id="flag-brazil" src="brazil.jpg" />
            <img id="flag-greece" src="greece.jpg" />
            <img id="flag-uk" src="uk.jpg" />
            <img id="flag-canada" src="canada.jpg" />
            <img id="flag-egypt" src="egypt.jpg" />
            <img id="flag-australia" src="australia.jpg" />
            <img id="flag-italy" src="italy.jpg" />
        </a-assets>

        <a-sky color="#1a1a1a"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="60" height="60" color="#222"></a-plane>

        <a-entity id="main-wall" position="0 0 -5">
            <a-plane width="17" height="9" color="#f5f5f5" position="0 4.5 0"></a-plane>

            <a-text 
                value="世界國旗互動故事牆"
                font="https://cdn.jsdelivr.net/gh/Yen-Ting/aframe-zh-fonts@master/NotoSansTC/NotoSansTC-Regular-msdf.json"
                shader="msdf"
                negate="false"
                align="center"
                position="0 8.1 0.5"
                color="#000000"
                width="10">
            </a-text>

            <a-image src="#flag-taiwan" position="-6.25 4.5 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 台灣 (Taiwan); desc: 探索福爾摩沙的風華，從雄偉的太魯閣峽谷到熱鬧的夜市文化與台北101。; imgs: taiwan1.jpg,taiwan2.jpg,taiwan3.jpg">
            </a-image>

            <a-image src="#flag-japan" position="-3.75 4.5 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 日本 (Japan); desc: 傳統神社與現代科技的完美融合，春季櫻花與富士山的絕美聖地。; imgs: japan1.jpg,japan2.jpg,japan3.jpg">
            </a-image>

            <a-image src="#flag-usa" position="-1.25 4.5 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 美國 (USA); desc: 自由女神像與紐約時代廣場，充滿活力與多元文化的現代大都市。; imgs: usa1.jpg,usa2.jpg">
            </a-image>

            <a-image src="#flag-france" position="1.25 4.5 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 法國 (France); desc: 艾菲爾鐵塔下的浪漫巴黎，藝術、時尚、羅浮宮與紅酒的極致饗宴。; imgs: france1.jpg,france2.jpg,france3.jpg">
            </a-image>

            <a-image src="#flag-brazil" position="3.75 4.5 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 巴西 (Brazil); desc: 熱情奔放的里約狂歡節，與守護著里約熱內盧的巨大救世基督像。; imgs: brazil1.jpg,brazil2.jpg">
            </a-image>

            <a-image src="#flag-greece" position="6.25 4.5 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 希臘 (Greece); desc: 沉浸在古希臘歷史遺跡與帕德嫩神廟的壯麗史詩中，探索西方文明的起源。; imgs: greece1.jpg,greece2.jpg,greece3.jpg">
            </a-image>

            <a-image src="#flag-uk" position="-5 2.2 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 英國 (United Kingdom); desc: 大笨鐘、倫敦塔橋與白金漢宮，承載著優雅英倫風情與輝煌歷史。; imgs: uk1.jpg,uk2.jpg,uk3.jpg">
            </a-image>

            <a-image src="#flag-canada" position="-2.5 2.2 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 加拿大 (Canada); desc: 壯麗的尼加拉大瀑布、落磯山脈，以及秋季滿山遍野的絕美紅楓。; imgs: canada1.jpg,canada2.jpg,canada3.jpg">
            </a-image>

            <a-image src="#flag-egypt" position="0 2.2 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 埃及 (Egypt); desc: 矗立於沙漠之中的吉薩金字塔群與人面獅身像，揭開數千年古文明的神秘面紗。; imgs: egypt1.jpg,egypt2.jpg">
            </a-image>

            <a-image src="#flag-australia" position="2.5 2.2 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 澳洲 (Australia); desc: 雪梨歌劇院的獨特帆船建築、壯麗的大堡礁海洋生態與可愛的無尾熊。; imgs: australia1.jpg,australia2.jpg,australia3.jpg">
            </a-image>

            <a-image src="#flag-italy" position="5 2.2 0.1" width="2" height="1.3" class="clickable"
                click-gallery="title: 義大利 (Italy); desc: 羅馬競技場、水都威尼斯與文藝復興的搖籃佛羅倫斯，充滿歷史與美食。; imgs: italy1.jpg,italy2.jpg,italy3.jpg">
            </a-image>
        </a-entity>

        <a-camera position="0 2.5 4" look-controls="pointerLockEnabled: false" cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-camera>
    </a-scene>

    <script>
        let mySwiper = null;

        // 註冊 A-Frame 元件，用來監聽國旗的點擊事件
        AFRAME.registerComponent('click-gallery', {
            schema: {
                title: { type: 'string' },
                desc: { type: 'string' },
                imgs: { type: 'string' } // 接收圖片字串
            },
            init: function () {
                var data = this.data;
                var el = this.el;

                el.addEventListener('click', function () {
                    // 點擊國旗時，將資料送給開啟彈窗的函式
                    openModal(data.title, data.desc, data.imgs);
                });
            }
        });

        // 開啟彈窗並初始化 Swiper 輪播圖
        function openModal(title, desc, imgsString) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;

            const wrapper = document.getElementById('modal-images-wrapper');
            wrapper.innerHTML = ''; // 每次開啟先清空上一次的照片

            if (imgsString) {
                // 將傳入的圖片檔名用逗號切開成陣列
                const imgArray = imgsString.split(',');
                imgArray.forEach(imgUrl => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    slide.innerHTML = `<img src="${imgUrl.trim()}" alt="國家特色照片">`;
                    wrapper.appendChild(slide);
                });
            }

            // 顯示彈窗（改為 flex 讓內部元件置中）
            document.getElementById('infoModal').style.display = 'flex';

            // 重要：必須等彈窗完全顯示後，再初始化 Swiper，否則會計算錯寬度導致無法滑動
            if (mySwiper) {
                mySwiper.destroy(); // 銷毀舊的實例
            }
            
            mySwiper = new Swiper(".mySwiper", {
                loop: true, // 循環播放
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                },
                navigation: {
                    nextEl: ".swiper-button-next",
                    prevEl: ".swiper-button-prev",
                },
            });
        }

        // 關閉彈窗
        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }
    </script>
</body>
</html>
